services:
  mysql:
    image: mysql:8.0
    container_name: faceaccess-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: faceaccess
      MYSQL_USER: faceaccess
      MYSQL_PASSWORD: faceaccess
    volumes:
      - faceaccess_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ufaceaccess", "-pfaceaccess"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  faceaccess_mysql_data:
