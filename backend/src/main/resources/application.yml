spring:
  application:
    name: faceaccess
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

face:
  recognition:
    threshold: 0.6
    embedding-dim: 512
  access:
    cooldown-minutes: 5
    feedback-seconds: 3
    recognize-interval-ms: 800

storage:
  type: local
  local-path: ./data/faces
  gcs-bucket: ${GCS_BUCKET:}
